version: '3.8'

services:
  techmind-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - MODEL_PATH=/app/models/modelo.pkl
      - VECTORIZER_PATH=/app/models/vectorizer.pkl
      - PYTHON_SCRIPT_PATH=/app/python/predict.py
    volumes:
      - ./models:/app/models:ro
      - ./src/main/python:/app/python:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/contenido/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - techmind-network

  # Servicio para entrenar modelo (ejecutar manualmente)
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    volumes:
      - ./models:/app/models
      - ./src/main/python:/app/python
    command: python /app/python/train_model.py
    profiles:
      - training
    networks:
      - techmind-network

networks:
  techmind-network:
    driver: bridge

volumes:
  models-data:
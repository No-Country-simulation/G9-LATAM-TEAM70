spring:
  application:
    name: techmind-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  docker:
    compose:
      enabled: false
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api
  shutdown: graceful

python:
  executable: python3
  model:
    script-path: ${MODEL_SCRIPT_PATH:src/main/python/predict.py}
    path: ${MODEL_PATH:models/modelo.pkl}
    vectorizer-path: ${VECTORIZER_PATH:models/vectorizer.pkl}
  timeout-seconds: 30

logging:
  level:
    com.team70: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"